<!-- Page Description: Handles user authentication, validates credentials, retrieves the auth token, and redirects to the dashboard upon successful login. -->
<!DOCTYPE html>

<html lang="en">

<head>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <title>University IT Help Desk Login</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link
        href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap"
        rel="stylesheet" />
    <link
        href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap"
        rel="stylesheet" />
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');
    </style>
    <script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#2563EB",
                        "background-light": "#f6f6f8",
                        "background-dark": "#101622",
                    },
                    fontFamily: {
                        "display": ["Inter", "sans-serif"]
                    },
                    borderRadius: { "DEFAULT": "0.25rem", "lg": "0.5rem", "xl": "0.75rem", "full": "9999px" },
                },
            },
        }
    </script>
</head>

<body
    class="font-display bg-background-light dark:bg-background-dark text-slate-900 dark:text-slate-100 min-h-screen flex flex-col justify-center items-center p-4">
    <div
        class="w-full max-w-md bg-white dark:bg-slate-800 rounded-xl shadow-lg overflow-hidden border border-slate-200 dark:border-slate-700">
        <!-- Header / Logo Area -->
        <div
            class="flex flex-col items-center justify-center pt-8 pb-4 px-6 border-b border-slate-100 dark:border-slate-700">
            <div class="w-16 h-16 bg-primary rounded-full flex items-center justify-center text-white mb-4 shadow-sm">
                <span class="material-symbols-outlined text-3xl">school</span>
            </div>
            <h1 class="text-2xl font-bold text-center leading-tight">University IT Help Desk</h1>
            <p class="text-slate-500 dark:text-slate-400 text-sm mt-2 text-center">Faculty Support for Students &amp;
                Staff</p>
        </div>
        <!-- Login Form Area -->
        <div class="p-6">
            <div class="mb-6">
                <h2 class="text-xl font-semibold mb-1">Welcome Back</h2>
                <p class="text-slate-500 dark:text-slate-400 text-sm">Sign in to submit or manage your support tickets
                </p>
            </div>
            <form id="loginForm" class="space-y-4">
                <!-- Error -->
                <p id="error" class="text-red-500 text-sm hidden"></p>

                <div>
                    <label class="block text-sm font-medium mb-1" for="email">University Email or ID</label>
                    <div class="relative">
                        <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
                            <span class="material-symbols-outlined text-slate-400 text-lg">person</span>
                        </div>
                        <input
                            class="form-input w-full pl-10 pr-3 py-2 border border-slate-300 dark:border-slate-600 rounded-lg bg-background-light dark:bg-background-dark focus:ring-2 focus:ring-primary focus:border-primary transition-colors text-slate-900 dark:text-slate-100"
                            id="email" placeholder="e.g. 123456A or jdoe.12@uom.lk" type="text" />
                    </div>
                </div>
                <div>
                    <div class="flex justify-between items-center mb-1">
                        <label class="block text-sm font-medium" for="password">Password</label>
                    </div>
                    <div class="relative">
                        <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
                            <span class="material-symbols-outlined text-slate-400 text-lg">lock</span>
                        </div>
                        <input
                            class="form-input w-full pl-10 pr-10 py-2 border border-slate-300 dark:border-slate-600 rounded-lg bg-background-light dark:bg-background-dark focus:ring-2 focus:ring-primary focus:border-primary transition-colors text-slate-900 dark:text-slate-100"
                            id="password" placeholder="Enter your password" type="password" />
                        <button type="button" class="absolute inset-y-0 right-0 pr-3 flex items-center text-slate-500 hover:text-slate-700 dark:hover:text-slate-300" onclick="togglePasswordVisibility('password', 'eyeIconPassword')">
                            <span id="eyeIconPassword" class="material-symbols-outlined text-xl">visibility_off</span>
                        </button>
                    </div>
                </div>
                <div class="flex items-center justify-between pt-2">
                    <div class="flex items-center">
                        <input class="h-4 w-4 text-primary focus:ring-primary border-slate-300 rounded" id="remember-me"
                            name="remember-me" type="checkbox" />
                        <label class="ml-2 block text-sm text-slate-600 dark:text-slate-300" for="remember-me">
                            Remember me
                        </label>
                    </div>
                    <a class="text-sm font-medium text-primary hover:underline" href="forgot_pass.html">Forgot
                        Password?</a>
                </div>
                <div class="pt-4 space-y-3">
                    <button
                        class="w-full flex justify-center py-2.5 px-4 border border-transparent rounded-lg shadow-sm text-sm font-semibold text-white bg-primary hover:bg-blue-700 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-primary transition-colors"
                        type="submit">
                        Login
                    </button>
                    <div class="relative flex py-2 items-center">
                        <div class="flex-grow border-t border-slate-300 dark:border-slate-600"></div>
                        <span
                            class="flex-shrink-0 mx-4 text-slate-400 dark:text-slate-500 text-xs uppercase tracking-wider">Or</span>
                        <div class="flex-grow border-t border-slate-300 dark:border-slate-600"></div>
                    </div>
                    <a href="registration.html">
                        <button
                            class="w-full flex justify-center py-2.5 px-4 border border-slate-300 dark:border-slate-600 rounded-lg shadow-sm text-sm font-semibold text-slate-700 dark:text-slate-200 bg-white dark:bg-slate-700 hover:bg-slate-50 dark:hover:bg-slate-600 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-primary transition-colors flex items-center justify-center gap-2"
                            type="button">
                            <span class="material-symbols-outlined text-lg">login</span>
                            Register
                        </button>
                    </a>
                </div>
            </form>
        </div>
        <!-- Footer Links -->
        <div
            class="px-6 py-4 bg-slate-50 dark:bg-slate-800/50 border-t border-slate-100 dark:border-slate-700 text-center">
            <p class="text-sm text-slate-500 dark:text-slate-400">
                Having trouble logging in? <a class="font-medium text-primary hover:underline" href="#">Need Help?</a>
            </p>
        </div>
    </div>

    <script>
        function togglePasswordVisibility(inputId, iconId) {
            const input = document.getElementById(inputId);
            const icon = document.getElementById(iconId);
            
            if (input.type === "password") {
                input.type = "text";
                icon.textContent = "visibility";
            } else {
                input.type = "password";
                icon.textContent = "visibility_off";
            }
        }

        document.getElementById("loginForm").addEventListener("submit", async function (e) {
            e.preventDefault();

            const identifier = document.getElementById("email").value.trim();
            const password = document.getElementById("password").value;
            const error = document.getElementById("error");
            const submitBtn = this.querySelector('button[type="submit"]');

            const emailRegex = /^[a-zA-Z]+\.\d{2}@uom\.lk$/;
            const studentIdRegex = /^\d{6}[A-Z]$/;

            if (!emailRegex.test(identifier) && !studentIdRegex.test(identifier)) {
                error.textContent = "Please enter a valid Student ID (e.g., 123456A) or University Email (e.g., jdoe.12@uom.lk)";
                error.classList.remove("hidden");
                return;
            }

            if (!password) {
                error.textContent = "Please enter your password";
                error.classList.remove("hidden");
                return;
            }

            error.classList.add("hidden");
            
            // Disable button and show loading state
            submitBtn.disabled = true;
            submitBtn.innerHTML = "Logging in...";

            try {
                // Send login data to backend
                const response = await fetch("/api/login", {
                    method: "POST",
                    headers: {
                        "Content-Type": "application/json"
                    },
                    body: JSON.stringify({
                        identifier: identifier,
                        password: password
                    })
                });

                if (response.ok) {
                    try {
                        const data = await response.json();
                        if (data && data.token) {
                            localStorage.setItem('token', data.token);
                        }
                    } catch (err) {
                        // ignore JSON parse error
                    }
                    alert("Login successful!");
                    window.location.href = "dashboard.html";
                } else {
                    let errorMessage = "Login failed. Please check your credentials and try again.";
                    try {
                        const data = await response.json();
                        if (data.message) errorMessage = data.message;
                    } catch (err) {}
                    error.textContent = errorMessage;
                    error.classList.remove("hidden");
                }
            } catch (err) {
                error.textContent = "Network error. Please try again later.";
                error.classList.remove("hidden");
            } finally {
                submitBtn.disabled = false;
                submitBtn.innerHTML = "Login";
            }
        });
    </script>
</body>

</html>
